<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Verification</title>
    <style>
        /* Modern Dark Theme UI Styles with Glowing Effects */
        :root {
            --bg-main: #0B0A10;
            --bg-card: #13141C;
            --text-main: #FFFFFF;
            --text-muted: #8B949E;
            --accent-blue: #3A64D8;
            --accent-green: #3FB950;
            --accent-red: #F85149;
            --glow-blue: 0 0 15px rgba(58, 100, 216, 0.6), 0 0 30px rgba(58, 100, 216, 0.4);
            --glow-green: 0 0 15px rgba(63, 185, 80, 0.6), 0 0 30px rgba(63, 185, 80, 0.4);
            --glow-red: 0 0 15px rgba(248, 81, 73, 0.6), 0 0 30px rgba(248, 81, 73, 0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            box-sizing: border-box;
            overflow: hidden;
            /* subtle background gradient glow */
            background: radial-gradient(circle at 50% -20%, #1e2640, #0B0A10 70%);
        }

        /* Header / Navbar Styles */
        .navbar {
            width: 100%;
            background-color: rgba(17, 18, 24, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(58, 100, 216, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-dp {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-blue);
            box-shadow: 0 0 8px rgba(58, 100, 216, 0.5);
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-size: 15px;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        .user-id {
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: rgba(58, 100, 216, 0.15);
            color: #58A6FF;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.5px;
            border: 1px solid rgba(58, 100, 216, 0.3);
            box-shadow: 0 0 10px rgba(58, 100, 216, 0.2);
        }

        .status-badge.active {
            background-color: rgba(63, 185, 80, 0.15);
            color: var(--accent-green);
            border-color: rgba(63, 185, 80, 0.3);
            box-shadow: 0 0 10px rgba(63, 185, 80, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #58A6FF;
            border-radius: 50%;
            box-shadow: 0 0 8px #58A6FF;
        }

        .status-badge.active .status-dot {
            background-color: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
        }

        /* Main Card Styles */
        .container {
            background: rgba(19, 20, 28, 0.6);
            backdrop-filter: blur(12px);
            margin-top: auto;
            margin-bottom: auto;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(58, 100, 216, 0.2);
            text-align: center;
            max-width: 360px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        
        /* Subtle glow behind card */
        .container::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background: radial-gradient(circle at center, rgba(58, 100, 216, 0.1) 0%, transparent 70%);
            z-index: -1;
            border-radius: 30px;
        }

        /* Icon Container */
        .icon-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid rgba(58, 100, 216, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: var(--glow-blue);
            transition: all 0.4s ease;
            background: rgba(11, 10, 16, 0.8);
        }

        .icon-container.success {
            border-color: var(--accent-green);
            box-shadow: var(--glow-green);
        }

        .icon-container.error {
            border-color: var(--accent-red);
            box-shadow: var(--glow-red);
        }

        /* SVG Icons */
        .svg-icon {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 5px currentColor);
        }

        /* Scanning Animation */
        .pulse {
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(58, 100, 216, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(58, 100, 216, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(58, 100, 216, 0); }
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        p.subtitle {
            color: var(--text-muted);
            margin: 0 0 35px 0;
            font-size: 14px;
        }

        /* Progress Bar */
        .progress-wrapper {
            width: 100%;
            display: block; 
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.1);
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(35, 37, 48, 0.8);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3A64D8, #58A6FF);
            border-radius: 6px;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.8);
        }

        /* Animated Green Checkmark & Red Cross */
        .anim-path {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: dash 0.6s ease-in-out forwards;
        }

        @keyframes dash {
            to { stroke-dashoffset: 0; }
        }

        /* Reset Screen specific */
        .reset-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            background-color: var(--bg-main);
            color: white;
            font-size: 24px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

<div class="navbar" id="navbar">
    <div class="user-info">
        <img id="userDp" class="user-dp" src="https://ui-avatars.com/api/?name=U&background=232530&color=fff" alt="DP">
        <div class="user-details">
            <div id="userName" class="user-name">Loading...</div>
            <div id="userIdText" class="user-id">ID: ---</div>
        </div>
    </div>
    <div id="statusBadge" class="status-badge">
        <span class="status-dot"></span> <span id="statusText">SCANNING</span>
    </div>
</div>

<div class="container" id="mainContainer">
    <div class="icon-container pulse" id="iconBox">
        <svg id="scanIcon" class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#58A6FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12C2 17.5228 6.47715 22 12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12Z"/>
            <path d="M9 16V16.01M15 8V8.01M12 12V12.01M12 16V16.01M12 8V8.01M9 8V8.01M15 16V16.01M9 12V12.01M15 12V12.01"/>
            <path d="M12 22C12 22 12 18 12 18M12 6C12 6 12 2 12 2"/>
        </svg>

        <svg id="successIcon" class="svg-icon" style="display: none;" viewBox="0 0 24 24" fill="none" stroke="#3FB950" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <path class="anim-path" d="M9 12l2 2 4-4"/>
        </svg>

        <svg id="errorIcon" class="svg-icon" style="display: none;" viewBox="0 0 24 24" fill="none" stroke="#F85149" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path class="anim-path" d="M15 9l-6 6M9 9l6 6"/>
        </svg>
    </div>

    <h2 id="titleText">Verifying Device</h2>
    <p class="subtitle" id="subText">Establishing secure handshake...</p>
    
    <div class="progress-wrapper" id="progressBox">
        <div class="progress-labels">
            <span>ANALYSIS IN PROGRESS</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 🔑 FIREBASE CONFIGURATION - Updated to match Bot configuration
    const firebaseConfig = {
        apiKey: "AIzaSyC6kbLjy-Hr_ZK5b0kMNMaO-e_ZoahiNDY",
        authDomain: "bot-alpha-77a82.firebaseapp.com",
        databaseURL: "https://bot-alpha-77a82-default-rtdb.firebaseio.com",
        projectId: "bot-alpha-77a82",
        storageBucket: "bot-alpha-77a82.firebasestorage.app",
        messagingSenderId: "422320067761",
        appId: "1:422320067761:web:f3eb96a35424bd10693e90"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Get URL Parameters
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');
    const paramName = urlParams.get('name') || "Telegram User"; 
    const paramDp = urlParams.get('dp');

    // ========== UPDATE DYNAMIC HEADER UI ==========
    if (userId) {
        document.getElementById('userIdText').innerText = `ID: ${userId}`;
    }
    
    // Set dynamically fetched name
    document.getElementById('userName').innerText = paramName;
    
    // Generate DP dynamically based on the user's name
    if (paramDp) {
        document.getElementById('userDp').src = paramDp;
    } else {
        const safeName = encodeURIComponent(paramName);
        document.getElementById('userDp').src = `https://ui-avatars.com/api/?name=${safeName}&background=232530&color=fff`;
    }
    // ==============================================

    // ========== 🚨 SECRET DATABASE RESET ROUTE 🚨 ==========
    if (window.location.href.includes('resetips')) {
        document.body.innerHTML = `<div class="reset-screen">Deleting all IPs... Please wait.</div>`;
        remove(ref(db, 'used_ips')).then(() => {
            document.body.innerHTML = `<div class="reset-screen" style="color: #3FB950; text-shadow: 0 0 15px rgba(63,185,80,0.5);">✅ Database wiped! All IPs have been deleted successfully.</div>`;
        }).catch(err => {
            document.body.innerHTML = `<div class="reset-screen" style="color: #F85149; text-shadow: 0 0 15px rgba(248,81,73,0.5);">❌ Failed to delete IPs: ${err.message}</div>`;
        });
        throw new Error("Resetting database. Halting execution."); 
    }
    // =======================================================

    // UI Elements
    const iconBox = document.getElementById('iconBox');
    const scanIcon = document.getElementById('scanIcon');
    const successIcon = document.getElementById('successIcon');
    const errorIcon = document.getElementById('errorIcon');
    
    const titleText = document.getElementById('titleText');
    const subText = document.getElementById('subText');
    const progressBox = document.getElementById('progressBox');
    
    const statusBadge = document.getElementById('statusBadge');
    const statusText = document.getElementById('statusText');

    function sanitizeIP(ip) {
        return ip.replace(/\./g, '_').replace(/:/g, '_');
    }

    // Animation function for Progress Bar
    function startProgressAnimation(duration, callback) {
        let start = Date.now();
        let fill = document.getElementById('progressFill');
        let percentText = document.getElementById('progressPercent');
        
        let timer = setInterval(() => {
            let timePassed = Date.now() - start;
            let progress = Math.min(timePassed / duration, 1);
            let percent = Math.floor(progress * 100);
            
            fill.style.width = percent + '%';
            percentText.innerText = percent + '%';
            
            if (timePassed >= duration) {
                clearInterval(timer);
                if(callback) callback();
            }
        }, 30);
    }

    // Status UI Updates
    function setSuccessUI() {
        statusBadge.classList.add('active');
        statusBadge.classList.remove('scanning');
        statusText.innerText = 'ACTIVE';

        iconBox.classList.remove('pulse');
        iconBox.classList.add('success');
        scanIcon.style.display = 'none';
        successIcon.style.display = 'block';

        titleText.innerText = "Verification Success";
        titleText.style.color = "white";
        titleText.style.textShadow = "0 0 10px rgba(63, 185, 80, 0.4)";
        subText.innerText = "You can close this page and return to the bot.";
        
        progressBox.style.display = 'none';
    }

    function setErrorUI(message) {
        statusBadge.classList.remove('scanning');
        statusText.innerText = 'FAILED';
        statusText.style.color = '#F85149';
        statusBadge.querySelector('.status-dot').style.backgroundColor = '#F85149';
        statusBadge.querySelector('.status-dot').style.boxShadow = '0 0 8px #F85149';

        iconBox.classList.remove('pulse');
        iconBox.classList.add('error');
        scanIcon.style.display = 'none';
        errorIcon.style.display = 'block';

        titleText.innerText = "Verification Failed";
        titleText.style.color = "#F85149";
        titleText.style.textShadow = "0 0 10px rgba(248, 81, 73, 0.4)";
        subText.innerText = message;
        
        progressBox.style.display = 'none';
    }

    // Flow Logic
    if (!userId) {
        setErrorUI("Invalid access. Please open this link from the Telegram bot.");
    } else {
        checkExistingVerification(userId);
    }

    async function checkExistingVerification(id) {
        try {
            const verificationRef = ref(db, 'verification/' + id);
            const snapshot = await get(verificationRef);
            
            if (snapshot.exists()) {
                const status = snapshot.val();
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressPercent').innerText = '100%';
                
                if(status === true || status === "true") {
                    setSuccessUI();
                } else if(status === 'failed') {
                    setErrorUI("Device previously blocked for multi-accounting.");
                } else {
                    startAutoVerification();
                }
            } else {
                startAutoVerification();
            }
        } catch (error) {
            setErrorUI("Database connection error. Please refresh.");
            console.error(error);
        }
    }

    async function startAutoVerification() {
        try {
            const ipResponse = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipResponse.json();
            const ipAddress = ipData.ip;
            const safeIp = sanitizeIP(ipAddress);

            // Using the actual schema paths aligned with the Bot
            const usedIpRef = ref(db, 'used_ips/' + safeIp);
            const ipSnapshot = await get(usedIpRef);

            startProgressAnimation(2500, async () => {
                if (ipSnapshot.exists()) {
                    // Force a fail update in the DB for this user since the IP is already mapped
                    try { await update(ref(db, 'verification'), { [userId]: 'failed' }); } catch(e) {}
                    setErrorUI("This IP address has already been used. Please use a new connection.");
                    return; 
                }

                // 70% Success Rate logic
                const isSuccess = Math.random() < 0.70; 

                try {
                    await update(ref(db), {
                        ['used_ips/' + safeIp]: {
                            status: isSuccess ? "success" : "failed",
                            userId: userId,
                            timestamp: new Date().toISOString()
                        },
                        ['verification/' + userId]: isSuccess ? true : 'failed'
                    });
                } catch(e) { console.error(e); }

                if (isSuccess) {
                    setSuccessUI();
                } else {
                    setErrorUI("Your connection failed the security check. Try a new connection.");
                }
            });

        } catch (error) {
            setErrorUI("Network error while fetching IP. Check your internet.");
        }
    }
</script>

</body>
</html>
