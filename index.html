<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Verification</title>
    <style>
        /* Modern Dark Theme UI Styles */
        :root {
            --bg-main: #0B0A10;
            --bg-card: #13141C;
            --text-main: #FFFFFF;
            --text-muted: #8B949E;
            --accent-blue: #3A64D8;
            --accent-green: #3FB950;
            --accent-red: #F85149;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Header / Navbar Styles */
        .navbar {
            width: 100%;
            background-color: #111218;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 1px solid #1C1E26;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-dp {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #2C2F36;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-size: 15px;
            font-weight: 600;
        }

        .user-id {
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: rgba(58, 100, 216, 0.15);
            color: #58A6FF;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .status-badge.active {
            background-color: rgba(63, 185, 80, 0.15);
            color: var(--accent-green);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #58A6FF;
            border-radius: 50%;
            box-shadow: 0 0 5px #58A6FF;
        }

        .status-badge.active .status-dot {
            background-color: var(--accent-green);
            box-shadow: 0 0 5px var(--accent-green);
        }

        /* Main Card Styles */
        .container {
            background: var(--bg-card);
            margin-top: auto;
            margin-bottom: auto;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid #232530;
            text-align: center;
            max-width: 360px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Icon Container */
        .icon-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid rgba(58, 100, 216, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: inset 0 0 20px rgba(58, 100, 216, 0.1), 0 0 20px rgba(58, 100, 216, 0.1);
            transition: all 0.4s ease;
        }

        .icon-container.success {
            border-color: rgba(63, 185, 80, 0.3);
            box-shadow: inset 0 0 20px rgba(63, 185, 80, 0.1), 0 0 20px rgba(63, 185, 80, 0.1);
        }

        .icon-container.error {
            border-color: rgba(248, 81, 73, 0.3);
            box-shadow: inset 0 0 20px rgba(248, 81, 73, 0.1), 0 0 20px rgba(248, 81, 73, 0.1);
        }

        /* SVG Icons */
        .svg-icon {
            width: 50px;
            height: 50px;
        }

        /* Scanning Animation */
        .pulse {
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.85); box-shadow: 0 0 0 0 rgba(58, 100, 216, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(58, 100, 216, 0); }
            100% { transform: scale(0.85); box-shadow: 0 0 0 0 rgba(58, 100, 216, 0); }
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
            letter-spacing: 0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin: 0 0 35px 0;
            font-size: 14px;
        }

        /* Progress Bar */
        .progress-wrapper {
            width: 100%;
            display: block; 
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: #232530;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-blue);
            border-radius: 4px;
            transition: width 0.1s linear;
        }

        /* Continue Button */
        .continue-btn {
            display: none;
            width: 100%;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
            text-decoration: none;
        }

        .continue-btn:hover {
            background: #2b4eb5;
        }

        /* Animated Green Checkmark & Red Cross */
        .anim-path {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: dash 0.6s ease-in-out forwards;
        }

        @keyframes dash {
            to { stroke-dashoffset: 0; }
        }

        /* Reset Screen specific */
        .reset-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            background-color: var(--bg-main);
            color: white;
            font-size: 24px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="navbar" id="navbar">
    <div class="user-info">
        <img id="userDp" class="user-dp" src="https://ui-avatars.com/api/?name=U&background=232530&color=fff" alt="DP">
        <div class="user-details">
            <div id="userName" class="user-name">Loading...</div>
            <div id="userIdText" class="user-id">ID: ---</div>
        </div>
    </div>
    <div id="statusBadge" class="status-badge">
        <span class="status-dot"></span> <span id="statusText">SCANNING</span>
    </div>
</div>

<div class="container" id="mainContainer">
    <div class="icon-container pulse" id="iconBox">
        <svg id="scanIcon" class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="#58A6FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12C2 17.5228 6.47715 22 12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12Z"/>
            <path d="M9 16V16.01M15 8V8.01M12 12V12.01M12 16V16.01M12 8V8.01M9 8V8.01M15 16V16.01M9 12V12.01M15 12V12.01"/>
            <path d="M12 22C12 22 12 18 12 18M12 6C12 6 12 2 12 2"/>
        </svg>

        <svg id="successIcon" class="svg-icon" style="display: none;" viewBox="0 0 24 24" fill="none" stroke="#3FB950" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <path class="anim-path" d="M9 12l2 2 4-4"/>
        </svg>

        <svg id="errorIcon" class="svg-icon" style="display: none;" viewBox="0 0 24 24" fill="none" stroke="#F85149" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path class="anim-path" d="M15 9l-6 6M9 9l6 6"/>
        </svg>
    </div>

    <h2 id="titleText">Verifying Device</h2>
    <p class="subtitle" id="subText">Establishing secure handshake...</p>
    
    <div class="progress-wrapper" id="progressBox">
        <div class="progress-labels">
            <span>ANALYSIS IN PROGRESS</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <a href="#" class="continue-btn" id="continueBtn">CONTINUE TO BOT</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    // ADDED 'update' to imports for safe data writing
    import { getDatabase, ref, get, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 🔑 FIREBASE CONFIGURATION
    const firebaseConfig = {
        apiKey: "AIzaSyCGUOPsQ4ALJy05iyIuBLbNsu-2gARnDrw",
        authDomain: "refer-zone-b9e48.firebaseapp.com",
        databaseURL: "https://refer-zone-b9e48-default-rtdb.firebaseio.com",
        projectId: "refer-zone-b9e48",
        storageBucket: "refer-zone-b9e48.firebasestorage.app",
        messagingSenderId: "1024531611430",
        appId: "1:1024531611430:web:bf52da491c3932b93e4be7"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Get URL Parameters
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');
    const paramName = urlParams.get('name') || "Telegram User"; 
    const paramDp = urlParams.get('dp');

    // ========== UPDATE DYNAMIC HEADER UI ==========
    if (userId) {
        document.getElementById('userIdText').innerText = `ID: ${userId}`;
    }
    
    // Set dynamically fetched name
    document.getElementById('userName').innerText = paramName;
    
    // Generate DP dynamically based on the user's name
    if (paramDp) {
        document.getElementById('userDp').src = paramDp;
    } else {
        const safeName = encodeURIComponent(paramName);
        document.getElementById('userDp').src = `https://ui-avatars.com/api/?name=${safeName}&background=232530&color=fff`;
    }
    // ==============================================

    // ========== 🚨 SECRET DATABASE RESET ROUTE 🚨 ==========
    if (window.location.href.includes('resetips')) {
        document.body.innerHTML = `<div class="reset-screen">Deleting all IPs... Please wait.</div>`;
        remove(ref(db, 'used_ips')).then(() => {
            document.body.innerHTML = `<div class="reset-screen" style="color: #3FB950;">✅ Database wiped! All IPs have been deleted successfully.</div>`;
        }).catch(err => {
            document.body.innerHTML = `<div class="reset-screen" style="color: #F85149;">❌ Failed to delete IPs: ${err.message}</div>`;
        });
        throw new Error("Resetting database. Halting execution."); 
    }
    // =======================================================

    // UI Elements
    const iconBox = document.getElementById('iconBox');
    const scanIcon = document.getElementById('scanIcon');
    const successIcon = document.getElementById('successIcon');
    const errorIcon = document.getElementById('errorIcon');
    
    const titleText = document.getElementById('titleText');
    const subText = document.getElementById('subText');
    const progressBox = document.getElementById('progressBox');
    const continueBtn = document.getElementById('continueBtn');
    
    const statusBadge = document.getElementById('statusBadge');
    const statusText = document.getElementById('statusText');

    function sanitizeIP(ip) {
        return ip.replace(/\./g, '_').replace(/:/g, '_');
    }

    // Animation function for Progress Bar
    function startProgressAnimation(duration, callback) {
        let start = Date.now();
        let fill = document.getElementById('progressFill');
        let percentText = document.getElementById('progressPercent');
        
        let timer = setInterval(() => {
            let timePassed = Date.now() - start;
            let progress = Math.min(timePassed / duration, 1);
            let percent = Math.floor(progress * 100);
            
            fill.style.width = percent + '%';
            percentText.innerText = percent + '%';
            
            if (timePassed >= duration) {
                clearInterval(timer);
                if(callback) callback();
            }
        }, 30);
    }

    // Status UI Updates
    function setSuccessUI() {
        statusBadge.classList.add('active');
        statusBadge.classList.remove('scanning');
        statusText.innerText = 'ACTIVE';

        iconBox.classList.remove('pulse');
        iconBox.classList.add('success');
        scanIcon.style.display = 'none';
        successIcon.style.display = 'block';

        titleText.innerText = "Already Verified";
        titleText.style.color = "white";
        subText.innerText = "You're checked, you can close this page.";
        
        progressBox.style.display = 'none';
    }

    function setErrorUI(message) {
        statusBadge.classList.remove('scanning');
        statusText.innerText = 'FAILED';
        statusText.style.color = '#F85149';
        statusBadge.querySelector('.status-dot').style.backgroundColor = '#F85149';
        statusBadge.querySelector('.status-dot').style.boxShadow = '0 0 5px #F85149';

        iconBox.classList.remove('pulse');
        iconBox.classList.add('error');
        scanIcon.style.display = 'none';
        errorIcon.style.display = 'block';

        titleText.innerText = "Verification Failed";
        titleText.style.color = "#F85149";
        subText.innerText = message;
        
        progressBox.style.display = 'none';
    }

    // Flow Logic
    if (!userId) {
        setErrorUI("Invalid access. Please open this link from the Telegram bot.");
    } else {
        checkExistingVerification(userId);
    }

    async function checkExistingVerification(id) {
        try {
            const userRef = ref(db, 'users/' + id);
            const snapshot = await get(userRef);
            
            if (snapshot.exists() && snapshot.val().verified === true) {
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressPercent').innerText = '100%';
                setSuccessUI();
            } else {
                startAutoVerification();
            }
        } catch (error) {
            setErrorUI("Database connection error. Please refresh.");
            console.error(error);
        }
    }

    async function startAutoVerification() {
        try {
            const ipResponse = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipResponse.json();
            const ipAddress = ipData.ip;
            const safeIp = sanitizeIP(ipAddress);

            const usedIpRef = ref(db, 'used_ips/' + safeIp);
            const ipSnapshot = await get(usedIpRef);

            startProgressAnimation(2500, async () => {
                if (ipSnapshot.exists()) {
                    setErrorUI("This IP address has already been used. Please use a new connection/IP.");
                    return; 
                }

                // CHANGED HERE: Updated probability to 90% (0.90)
                const isSuccess = Math.random() < 0.90; 

                try {
                    await set(usedIpRef, {
                        status: isSuccess ? "success" : "failed",
                        userId: userId,
                        timestamp: new Date().toISOString()
                    });
                } catch(e) { console.error(e); }

                if (isSuccess) {
                    try {
                        const userRef = ref(db, 'users/' + userId);
                        // 🚨 BUG FIXED HERE: Changed 'set' to 'update' so balance doesn't become 0
                        await update(userRef, {
                            verified: true,
                            device: navigator.userAgent,
                            ip: ipAddress,
                            verify_timestamp: new Date().toISOString()
                        });
                        setSuccessUI();
                    } catch (error) {
                        setErrorUI("Failed to save verification data.");
                    }
                } else {
                    setErrorUI("Your connection failed the security check. Try a new IP.");
                }
            });

        } catch (error) {
            setErrorUI("Network error while fetching IP. Check your internet.");
        }
    }
</script>

</body>
</html>
