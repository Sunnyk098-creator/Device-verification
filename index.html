<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Verification</title>
    <style>
        /* Modern Glowing Theme UI Styles */
        :root {
            --bg-dark: #0f101c;
            --card-bg: #13141f;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --accent-purple: #8E7BFF;
            --accent-green: #3FB950;
            --accent-red: #ef4444;
            --accent-blue: #2563eb;
            --glow-p-strong: 0 0 15px rgba(142, 123, 255, 0.6), 0 0 30px rgba(142, 123, 255, 0.4);
            --glow-p-subtle: 0 0 10px rgba(142, 123, 255, 0.3);
            --glow-b-strong: 0 0 15px rgba(37, 99, 235, 0.6), 0 0 30px rgba(37, 99, 235, 0.4);
            --glow-r-strong: 0 0 15px rgba(239, 68, 68, 0.6), 0 0 30px rgba(239, 68, 68, 0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 50% -20%, #1a1e36, var(--bg-dark) 70%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        /* Animated Bokeh Bubble Background Elements */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(142, 123, 255, 0.1), rgba(142, 123, 255, 0.05) 50%, transparent 70%);
            z-index: -1;
            filter: blur(5px);
            opacity: 0;
            animation: float-in 10s ease-in-out infinite alternate;
            transition: background 1.5s ease;
        }
        .success .bubble {
            background: radial-gradient(circle at 30% 30%, rgba(37, 99, 235, 0.1), rgba(37, 99, 235, 0.05) 50%, transparent 70%);
        }

        .bubble-1 { width: 120px; height: 120px; top: 15%; left: 20%; animation-delay: -2s; }
        .bubble-2 { width: 80px; height: 80px; top: 40%; right: 15%; animation-delay: -5s; }
        .bubble-3 { width: 150px; height: 150px; bottom: 20%; left: 10%; animation-delay: -1s; }
        .bubble-4 { width: 90px; height: 90px; bottom: 35%; right: 25%; animation-delay: -8s; }
        .bubble-5 { width: 60px; height: 60px; top: 60%; left: 35%; animation-delay: -4s; }

        @keyframes float-in {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            10% { opacity: 0.15; }
            50% { transform: translateY(-30px) scale(1); opacity: 0.25; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10px) scale(0.9); opacity: 0; }
        }

        /* Header / Navbar Styles */
        .navbar {
            width: 100%;
            background-color: rgba(19, 20, 31, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-dp {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-purple);
            box-shadow: 0 0 10px rgba(142, 123, 255, 0.6);
            transition: border-color 1s ease;
        }
        .success .user-dp {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.6);
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .user-id {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Scanning/Active Status Badge */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: rgba(142, 123, 255, 0.1);
            color: #b19dfa;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            border: 1px solid rgba(142, 123, 255, 0.3);
            transition: all 1s ease;
        }

        .status-badge.active {
            background-color: rgba(63, 185, 80, 0.1);
            color: var(--accent-green);
            border-color: rgba(63, 185, 80, 0.3);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #8E7BFF;
            border-radius: 50%;
            box-shadow: 0 0 8px #8E7BFF;
            transition: all 1s ease;
        }

        .status-badge.active .status-dot {
            background-color: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
        }

        /* Main Card Panel Styles */
        .container {
            background: rgba(19, 20, 28, 0.7);
            backdrop-filter: blur(12px);
            margin: auto;
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(142, 123, 255, 0.3);
            text-align: center;
            max-width: 360px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
            transition: border-color 1s ease;
        }
        .success .container {
            border-color: rgba(37, 99, 235, 0.3);
        }

        /* Custom Concentric Particles Spinner (Purple rings) */
        .particles-spinner {
            width: 120px;
            height: 120px;
            position: relative;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .particles-spinner::before { /* Center Dot */
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-purple);
            box-shadow: 0 0 10px var(--accent-purple);
        }

        .particle-rings {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-sizing: border-box;
            border: 3px solid transparent;
            border-top-color: var(--accent-purple);
            border-right-color: var(--accent-purple);
            filter: drop-shadow(var(--glow-p-subtle));
            animation: spin 1s linear infinite;
        }
        
        .particle-rings::after { /* Second concentric ring with orbiting dot */
            content: '';
            position: absolute;
            width: 75%;
            height: 75%;
            top: 12.5%;
            left: 12.5%;
            border-radius: 50%;
            border: 2px solid transparent;
            border-bottom-color: rgba(142, 123, 255, 0.6);
            border-left-color: rgba(142, 123, 255, 0.6);
            animation: spin-orbit 2.5s linear infinite reverse;
        }

        .orbital-dot { /* Small particle orbiting outer ring */
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-purple);
            box-shadow: 0 0 8px var(--accent-purple);
            top: 20px;
            left: 20px;
            animation: orbit-dot 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-orbit { 100% { transform: rotate(360deg); } }
        @keyframes orbit-dot {
            0% { transform: translate(0, 0); }
            25% { transform: translate(60px, -20px); }
            50% { transform: translate(40px, 40px); }
            75% { transform: translate(-20px, 60px); }
            100% { transform: translate(0, 0); }
        }

        /* Success Icon - Shield in Glowing Ring */
        .success-shield {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--accent-blue);
            box-shadow: var(--glow-b-strong);
            background: rgba(11,10,16,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        .success-shield svg {
            width: 45px;
            height: 45px;
            color: var(--accent-blue);
            filter: drop-shadow(0 0 5px var(--accent-blue));
        }

        /* Main and Sub Text Styles */
        h2.main-title {
            margin: 0 0 8px 0;
            font-size: 22px;
            letter-spacing: 0.5px;
            font-weight: 700;
            text-shadow: var(--glow-p-subtle);
            transition: color 1s ease, text-shadow 1s ease;
        }
        .main-title.success-state {
            color: var(--accent-blue);
            text-shadow: var(--glow-b-strong);
        }
        .main-title.error-state {
            color: var(--accent-red);
            text-shadow: var(--glow-r-strong);
        }

        p.subtitle {
            color: var(--text-muted);
            margin: 0 0 30px 0;
            font-size: 14px;
            text-align: center;
        }

        /* Dynamic Progress Bar (Purple) */
        .progress-wrapper {
            width: 100%;
            display: block; 
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #A78BFA;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-shadow: var(--glow-p-subtle);
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6d28d9, #a78bfa);
            border-radius: 6px;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(167, 139, 250, 0.6);
        }

        /* Animated Success Checkmark & Cross in ring spinners */
        .ring-spin-complete {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid transparent;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .ring-success { border-color: var(--accent-green); box-shadow: 0 0 20px rgba(63, 185, 80, 0.4); animation: dash-ring 0.6s ease-in-out; }
        .ring-failed { border-color: var(--accent-red); box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); animation: dash-ring 0.6s ease-in-out; }

        @keyframes dash-ring { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }

        .anim-path {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: dash 0.6s ease-in-out forwards 0.2s;
        }

        @keyframes dash { to { stroke-dashoffset: 0; } }

        /* General Continue Button Structure (Blue) */
        .action-btn {
            display: none;
            width: 100%;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s, box-shadow 0.3s, transform 0.2s;
            text-decoration: none;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .action-btn.btn-active {
            display: block;
            background: #1e40af; /* slightly darker blue on default state to make hover stronger */
            box-shadow: 0 5px 20px rgba(37, 99, 235, 0.3);
        }
        .action-btn.btn-active:hover {
            background: var(--accent-blue);
            box-shadow: var(--glow-b-strong);
        }
        .action-btn.btn-active:active {
            transform: translateY(2px);
        }

        /* Error state of button */
        .btn-error {
            background: var(--accent-red) !important;
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.3) !important;
        }
        .btn-error:hover {
            box-shadow: var(--glow-r-strong) !important;
        }

        /* Secret Reset Screen Aesthetics */
        .reset-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            background-color: var(--bg-dark);
            color: white;
            font-size: 24px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Footer Aesthetics */
        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 11px;
            color: #55576b;
            letter-spacing: 0.5px;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="bubble bubble-1"></div>
<div class="bubble bubble-2"></div>
<div class="bubble bubble-3"></div>
<div class="bubble bubble-4"></div>
<div class="bubble bubble-5"></div>

<div class="navbar" id="navbar">
    <div class="user-info">
        <img id="userDp" class="user-dp" src="https://ui-avatars.com/api/?name=U&background=1a1e36&color=fff" alt="DP">
        <div class="user-details">
            <div id="userName" class="user-name">Sunny Bot Maker</div>
            <div id="userIdText" class="user-id">ID: 8522410574</div>
        </div>
    </div>
    <div id="statusBadge" class="status-badge">
        <span class="status-dot"></span> <span id="statusText">SCANNING</span>
    </div>
</div>

<div class="container" id="mainCard">
    
    <div class="particles-spinner" id="scanner">
        <div class="particle-rings"></div>
        <div class="orbital-dot"></div>
    </div>

    <div class="success-shield" id="successShield">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
    </div>

    <div class="ring-spin-complete" id="postVerifySpinner">
        <svg id="completeCheck" style="display:none;" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#3FB950" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path class="anim-path" d="M9 12l2 2 4-4"/>
        </svg>

        <svg id="completeCross" style="display:none;" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" opacity="0.3"/>
            <path class="anim-path" d="M15 9l-6 6M9 9l6 6"/>
        </svg>
    </div>

    <h2 class="main-title" id="mainTitle">Verifying Device</h2>
    <p class="subtitle" id="subTitle">Completing authorization...</p>
    
    <div class="progress-wrapper" id="progressBarSlots">
        <div class="progress-labels">
            <span>ANALYSIS IN PROGRESS</span>
            <span id="progressPercentLabel">0%</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <a href="#" class="action-btn" id="actionBtn">Continue to Bot</a>

</div>

<div class="footer">
    © 2026 Prince | Designed By Prince
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 🔑 UPDATED FIREBASE CONFIGURATION (Matches your latest)
    const firebaseConfig = {
        apiKey: "AIzaSyC6kbLjy-Hr_ZK5b0kMNMaO-e_ZoahiNDY",
        authDomain: "bot-alpha-77a82.firebaseapp.com",
        databaseURL: "https://bot-alpha-77a82-default-rtdb.firebaseio.com",
        projectId: "bot-alpha-77a82",
        storageBucket: "bot-alpha-77a82.firebasestorage.app",
        messagingSenderId: "422320067761",
        appId: "1:422320067761:web:f3eb96a35424bd10693e90"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Get URL Parameters
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');
    const paramName = urlParams.get('name') || "Telegram User"; 
    const paramDp = urlParams.get('dp');

    // ========== DYNAMIC UI INIT ==========
    if (userId) {
        document.getElementById('userIdText').innerText = `ID: ${userId}`;
    }
    
    // Set dynamic name from URL
    document.getElementById('userName').innerText = paramName;
    
    // Generate DP dynamically based on the user's name or provided URL
    if (paramDp) {
        document.getElementById('userDp').src = paramDp;
    } else {
        const safeName = encodeURIComponent(paramName);
        document.getElementById('userDp').src = `https://ui-avatars.com/api/?name=${safeName}&background=1a1e36&color=fff`;
    }
    // =====================================

    // ========== SECRET RESET IPs ROUTE ==========
    if (window.location.href.includes('resetips')) {
        document.body.innerHTML = `<div class="reset-screen">Deleting all IPs... Please wait.</div>`;
        remove(ref(db, 'used_ips')).then(() => {
            document.body.innerHTML = `<div class="reset-screen" style="color: #3FB950; text-shadow: 0 0 15px rgba(63,185,80,0.5);">✅ Database wiped! All IPs have been deleted successfully.</div>`;
        }).catch(err => {
            document.body.innerHTML = `<div class="reset-screen" style="color: #F85149; text-shadow: 0 0 15px rgba(248,81,73,0.5);">❌ Failed to delete IPs: ${err.message}</div>`;
        });
        throw new Error("Resetting database. Halting execution."); 
    }
    // ============================================

    // UI Structure References
    const statusBadge = document.getElementById('statusBadge');
    const statusText = document.getElementById('statusText');
    const scanner = document.getElementById('scanner');
    const successShield = document.getElementById('successShield');
    const postVerifySpinner = document.getElementById('postVerifySpinner');
    const mainTitle = document.getElementById('mainTitle');
    const subTitle = document.getElementById('subTitle');
    const progressBarSlots = document.getElementById('progressBarSlots');
    const actionBtn = document.getElementById('actionBtn');

    // Logic utilities
    function sanitizeIP(ip) { return ip.replace(/\./g, '_').replace(/:/g, '_'); }

    // Progress Animation function (Updated to take milliseconds as input)
    function startProgressAnimation(durationMs, callback) {
        let start = Date.now();
        let fill = document.getElementById('progressFill');
        let percentLabel = document.getElementById('progressPercentLabel');
        
        let timer = setInterval(() => {
            let timePassed = Date.now() - start;
            let progress = Math.min(timePassed / durationMs, 1);
            let percent = Math.floor(progress * 100);
            
            fill.style.width = percent + '%';
            percentLabel.innerText = percent + '%';
            
            if (timePassed >= durationMs) {
                clearInterval(timer);
                if(callback) callback();
            }
        }, 30); // 30ms resolution is smooth enough
    }

    // ========== UI STATE UPDATORS ==========
    function showAlreadyVerifiedUI() {
        // Change bokeh color to blue
        document.body.classList.add('success');
        
        statusBadge.className = 'status-badge active';
        statusText.innerText = 'ACTIVE';

        scanner.style.display = 'none';
        progressBarSlots.style.display = 'none';
        successShield.style.display = 'flex'; // show shield

        mainTitle.className = 'main-title success-state';
        mainTitle.innerText = "Already Verified";
        
        subTitle.innerText = "This device has already been authorized for use.";
        
        // Show glowing blue "CONTINUE TO BOT" button
        actionBtn.className = 'action-btn btn-active';
        actionBtn.href = "#"; // Replace with your bot's redirect URL if needed
        actionBtn.innerText = "Continue to Bot";
    }

    function showVerificationErrorUI(errorMessage) {
        statusText.innerText = 'FAILED';
        statusText.style.color = '#F85149';
        statusBadge.querySelector('.status-dot').style.backgroundColor = '#F85149';
        statusBadge.querySelector('.status-dot').style.boxShadow = '0 0 10px #F85149';
        statusBadge.style.borderColor = 'rgba(239, 68, 68, 0.4)';

        scanner.style.display = 'none';
        progressBarSlots.style.display = 'none';
        postVerifySpinner.style.display = 'flex';
        postVerifySpinner.className = 'ring-spin-complete ring-failed';
        document.getElementById('completeCross').style.display = 'block'; // Show static error cross in ring

        mainTitle.className = 'main-title error-state';
        mainTitle.innerText = "Verification Failed";
        
        subTitle.innerText = errorMessage;
        
        // Show glowing red "CLOSE PAGE" button
        actionBtn.className = 'action-btn btn-active btn-error';
        actionBtn.href = "#";
        actionBtn.innerText = "Close Page";
        actionBtn.onclick = () => window.close(); // Close on click
    }

    function showJustVerifiedUI() {
        // Transition from scanning spinner to success ring spinner
        scanner.style.display = 'none';
        postVerifySpinner.style.display = 'flex';
        postVerifySpinner.className = 'ring-spin-complete ring-success';
        document.getElementById('completeCheck').style.display = 'block'; // animate checkmark

        // Then update the rest of the UI
        startProgressAnimation(100, () => { // tiny delay for aesthetics
            statusBadge.className = 'status-badge active';
            statusText.innerText = 'ACTIVE';
            
            mainTitle.className = 'main-title success-state';
            mainTitle.innerText = "Verification Success";
            subTitle.innerText = "Check your connection and return to the bot.";
            
            progressBarSlots.style.display = 'none';
            
            actionBtn.className = 'action-btn btn-active';
            actionBtn.innerText = "Return to Bot";
            actionBtn.onclick = () => window.close();
        });
    }

    // ========== Flow Logic ==========
    if (!userId) {
        showVerificationErrorUI("Invalid access. Please open this link from the Telegram bot.");
    } else {
        checkCurrentVerificationStatus(userId);
    }

    async function checkCurrentVerificationStatus(id) {
        try {
            const verificationRef = ref(db, 'verification/' + id);
            const snapshot = await get(verificationRef);
            
            if (snapshot.exists()) {
                const status = snapshot.val();
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressPercentLabel').innerText = '100%';
                
                if(status === true || status === "true") {
                    showAlreadyVerifiedUI();
                } else if(status === 'failed') {
                    showVerificationErrorUI("Device previously blocked for multi-accounting.");
                } else {
                    processNewVerification(id);
                }
            } else {
                processNewVerification(id);
            }
        } catch (error) {
            showVerificationErrorUI("Database connection error. Please refresh.");
            console.error(error);
        }
    }

    async function processNewVerification(id) {
        try {
            const ipResponse = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipResponse.json();
            const ipAddress = ipData.ip;
            const safeIp = sanitizeIP(ipAddress);

            const usedIpRef = ref(db, 'used_ips/' + safeIp);
            const ipSnapshot = await get(usedIpRef);

            // UPDATED: Progress duration is now 5 seconds (5000ms)
            startProgressAnimation(5000, async () => {
                if (ipSnapshot.exists()) {
                    // Force a fail entry in the verification path for the user too for bot synchronization
                    try { await update(ref(db, 'verification'), { [id]: 'failed' }); } catch(e) {}
                    showVerificationErrorUI("This IP address has already been used on another device.");
                    return; 
                }

                // Probability remains 70% success as earlier
                const isSuccess = Math.random() < 0.70; 

                // ATOMIC WRITE: Update IP status and Verification status simultaneously
                try {
                    await update(ref(db), {
                        ['used_ips/' + safeIp]: {
                            status: isSuccess ? "success" : "failed",
                            userId: userId,
                            timestamp: new Date().toISOString()
                        },
                        ['verification/' + id]: isSuccess ? true : 'failed'
                    });
                } catch(e) { console.error(e); }

                if (isSuccess) {
                    showJustVerifiedUI();
                } else {
                    showVerificationErrorUI("Your device failed the security analysis.");
                }
            });

        } catch (error) {
            showVerificationErrorUI("Network error while fetching IP. Please check internet.");
        }
    }
</script>

</body>
</html>
